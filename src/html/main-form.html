<form class="main-form" action="#">
  <div class="main-form__block">
    <input class="main-form__block-input" id="username" type="text" placeholder="Username" required>
    <label class="main-form__block-label" for="username">Name</label>
  </div>
  <div class="main-form__block">
    <input class="main-form__block-input" id="email" type="text" placeholder="mail" required>
    <label class="main-form__block-label" for="email">Email</label>
  </div>
  <div class="main-form__area">
    <textarea class="main-form__area-textarea" placeholder="textarea" required></textarea>
    <label class="main-form__area-label">Textarea</label>
  </div>
  <button class="main-form__submit" type="submit">Submit</button>
</form>
